  <g fill="#3d2117" font-family="serif" font-size="34" opacity=".62">
    <text x="340" y="281" transform="rotate(-4 340 281)">稿单</text>
    <text x="365" y="575" transform="rotate(-4 365 575)">旧稿订收</text>
  </g>
  <path d="M294 414 C246 457 251 498 306 538 C353 572 344 623 281 655" fill="none" stroke="#c65b49" stroke-width="8" opacity=".82"/>
  <circle cx="278" cy="655" r="7" fill="#d96554"/>
  <text x="64" y="112" fill="#ead8bd" font-family="serif" font-size="44" letter-spacing="6">缺失稿单</text>
  <text x="64" y="168" fill="#cfa47a" font-family="serif" font-size="25">边缘缺口太整齐，像被人先一步取走</text>
