      <stop offset=".55" stop-color="#423020"/>
      <stop offset="1" stop-color="#0b0909"/>
    </linearGradient>
    <linearGradient id="sheet" x1=".2" y1=".05" x2=".92" y2=".96">
      <stop offset="0" stop-color="#e2cba0"/>
      <stop offset=".58" stop-color="#c39b68"/>
      <stop offset="1" stop-color="#6a452c"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#desk)"/>
  <path d="M174 187 L769 136 L822 802 L228 852 Z" fill="#17100e" opacity=".62"/>
  <path d="M202 166 L792 126 L838 786 L247 835 L234 658 C318 642 336 584 276 536 C225 495 218 439 262 403 L202 166 Z" fill="url(#sheet)" stroke="#2d1a12" stroke-width="9"/>
  <path d="M236 657 C314 636 339 584 276 536 C225 495 218 439 262 403" fill="#120d0d" opacity=".72"/>
  <g stroke="#5f3a25" stroke-width="8" stroke-linecap="round" opacity=".5">
    <path d="M318 288 L706 256"/>
    <path d="M324 360 L722 326"/>
    <path d="M334 434 L736 400"/>
    <path d="M348 508 L748 474"/>
    <path d="M384 586 L762 554"/>
    <path d="M342 662 L774 626"/>
    <path d="M352 736 L786 700"/>
